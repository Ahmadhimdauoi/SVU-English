
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVU English Placement Test Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* Hide everything when printing (screenshot via print) */
        @media print {
            body * {
                display: none !important;
            }
            body::after {
                content: "Content is protected and cannot be printed.";
                display: block;
                font-size: 24px;
                text-align: center;
                padding: 50px;
                color: #666;
            }
        }
    </style>
</head>
<body oncontextmenu="return false;" oncopy="return false;" oncut="return false;" onpaste="return false;" ondragstart="return false;" onselectstart="return false;">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
        // Prevent keyboard shortcuts for copy, cut, print, save, select all, dev tools
        document.addEventListener('keydown', function(e) {
            // Ctrl+C, Ctrl+X, Ctrl+V, Ctrl+A, Ctrl+S, Ctrl+P
            if (e.ctrlKey && (e.key === 'c' || e.key === 'x' || e.key === 'v' || e.key === 'a' || e.key === 's' || e.key === 'p' ||
                              e.key === 'C' || e.key === 'X' || e.key === 'V' || e.key === 'A' || e.key === 'S' || e.key === 'P')) {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+I (Dev Tools), Ctrl+Shift+J (Console), Ctrl+Shift+C (Inspector)
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
                return false;
            }
            // Ctrl+U (View Source)
            if (e.ctrlKey && (e.key === 'u' || e.key === 'U')) {
                e.preventDefault();
                return false;
            }
            // F12 (Dev Tools)
            if (e.key === 'F12') {
                e.preventDefault();
                return false;
            }
            // PrintScreen
            if (e.key === 'PrintScreen') {
                navigator.clipboard.writeText('').catch(() => {});
                e.preventDefault();
                return false;
            }
        }, true);

        // Clear clipboard on visibility change (when user switches tab after PrintScreen)
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') {
                navigator.clipboard.writeText('').catch(() => {});
            }
        });
    </script>
</body>
</html>
